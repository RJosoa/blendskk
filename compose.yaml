services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blendsk_app
    image: josoa/blendsk:latest
    volumes:
      - blendsk_var:/var/www/blendsk/var
    environment:
      DATABASE_URL: "mysql://root:root@database:3306/blendsk?serverVersion=8.0"
    ports:
      - "9000:9000"
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: blendsk_nginx
    volumes:
      - ./public:/var/www/blendsk/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - app

  database:
    image: mysql:8.0
    container_name: blendsk_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blendsk
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 5

  sonar:
    image: sonarqube:community
    container_name: blendsk_sonar
    restart: always
    ports:
      - "9001:9000"
    environment:
      SONARQUBE_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONARQUBE_JDBC_USERNAME: sonar
      SONARQUBE_JDBC_PASSWORD: sonar
    depends_on:
      - sonar-db

  sonar-db:
    image: postgres:latest
    container_name: blendsk_sonar_db
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_data:/var/lib/postgresql/data

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: blendsk_jenkins
    restart: always
    privileged: true
    user: root
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - /var/www/blendsk:/var/www/blendsk
      - /var/run/docker.sock:/var/run/docker.sock
      - jenkins_home:/var/jenkins_home
    environment:
      - JENKINS_OPTS=--prefix=/jenkins
      - DOCKER_HOST=unix:///var/run/docker.sock

volumes:
  database_data:
  sonar_data:
  jenkins_home:
  blendsk_var:
