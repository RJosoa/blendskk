services:
  app:
    container_name: blendsk_app
    image: josoa/blendsk:latest
    volumes:
      - /var/www/blendsk:/var/www/blendsk:ro
    ports:
      - "9000:9000"
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: blendsk_nginx
    volumes:
      - /var/www/blendsk:/var/www/blendsk:ro
      - ./symfony-docker/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - app

  database:
    image: mysql:8.0
    container_name: blendsk_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blendsk
    volumes:
      - database_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 5

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: blendsk_jenkins
    restart: always
    privileged: true
    user: root
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /usr/libexec/docker:/usr/libexec/docker
    environment:
      - JENKINS_OPTS=--prefix=/jenkins


volumes:
  database_data:
  jenkins_home:
