services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blendsk_app
    volumes:
      - .:/var/www/blendsk
      - /var/www/blendsk/vendor/
      - /var/www/blendsk/var/
    ports:
      - "9000:9000"
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: blendsk_nginx
    volumes:
      - .:/var/www/blendsk
      - ./symfony-docker/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - app

  database:
    image: mysql:8.0
    container_name: blendsk_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blendsk
    volumes:
      - database_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 5

  sonar:
    image: sonarqube:community
    container_name: blendsk_sonar
    restart: always
    ports:
      - "9001:9000"
    environment:
      SONARQUBE_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONARQUBE_JDBC_USERNAME: sonar
      SONARQUBE_JDBC_PASSWORD: sonar
    depends_on:
      - sonar-db

  sonar-db:
    image: postgres:latest
    container_name: blendsk_sonar_db
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_data:/var/lib/postgresql/data

volumes:
  database_data:
  sonar_data:
